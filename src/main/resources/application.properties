spring.application.name=PulseDeck
server.port=8080

spring.datasource.url=jdbc:h2:mem:pulsedeck
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.defer-datasource-initialization=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true

app.client.url=http://localhost:5173

huggingface.api.token=${HF_TOKEN}
huggingface.api.url=https://router.huggingface.co/v1/chat/completions
huggingface.api.model=meta-llama/Llama-3.1-8B-Instruct